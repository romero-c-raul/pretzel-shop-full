name: ci workflow

# Trigger workflow when pushing to main or when creating a PR to main
on:
  push:
    branches: [main] 
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # Only one workflow run allowed perf branch, per PR
  cancel-in-progress: true

permissions:
  contents: read    # Only can read the repository contents
  packages: write   # Permission needed to write to GHCR
  id-token: write   # -- Pending, add explanation later
  security-events: write # Allows us to edit/update code scanning alerts

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/pretzel-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/pretzel-frontend

jobs:
  lint-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend # Everything runs from backend directory
    steps:
      - uses: actions/checkout@v4     # Check out the code from the repository
      - uses: actions/setup-node@v4   # Set up nodejs environment
        with:
          node-version: 24
          cache: "npm" # Cache node modules to speed up subsequent runs
          cache-dependency-path: backend/package-lock.json  # Cache node modules based on package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
  lint-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend # Everything runs from frontend directory
    steps:
      - uses: actions/checkout@v4     # Check out the code from the repository
      - uses: actions/setup-node@v4   # Set up nodejs environment
        with:
          node-version: 24
          cache: "npm" # Cache node modules to speed up subsequent runs
          cache-dependency-path: frontend/package-lock.json  # Cache node modules based on package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build