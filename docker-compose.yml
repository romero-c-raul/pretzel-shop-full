services:

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pretzel_shop
      POSTGRES_USER: pretzel_user
      POSTGRES_PASSWORD: pretzel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pretzel_user -d pretzel_shop"]
      interval: 10s
      timeout: 5s
      retries: 5