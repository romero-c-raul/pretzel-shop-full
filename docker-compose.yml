services:

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pretzel_shop
      POSTGRES_USER: pretzel_user
      POSTGRES_PASSWORD: pretzel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pretzel_user -d pretzel_shop"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:8-alpine
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pretzel_shop
      DB_USER: pretzel_user
      DB_PASSWORD: pretzel_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://192.168.56.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://192.168.56.2:3001
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: