services:
  postgres:
    image: postgres:15-alpine
    container_name: pretzel-shop-postgres
    environment:
      POSTGRES_DB: pretzel_shop
      POSTGRES_USER: pretzel_user
      POSTGRES_PASSWORD: pretzel_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pretzel_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pretzel-shop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

